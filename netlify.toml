# ProofLink — netlify.toml
# Do not modify the [build] block unless you are changing your build tool.

[build]
  publish   = "."
  functions = "netlify/functions"

# ── Public routes ─────────────────────────────────────────────────────────────
[[redirects]]
  from   = "/join"
  to     = "/join.html"
  status = 200

# ── Operator routes ───────────────────────────────────────────────────────────
[[redirects]]
  from   = "/operator"
  to     = "/operator/index.html"
  status = 200

[[redirects]]
  from   = "/operator/launch"
  to     = "/operator/launch.html"
  status = 200

[[redirects]]
  from   = "/operator/onboarding"
  to     = "/operator/onboarding.html"
  status = 200

# ── Admin routes ──────────────────────────────────────────────────────────────
[[redirects]]
  from   = "/admin"
  to     = "/admin/index.html"
  status = 200

# ── API proxy routes → Netlify functions ────────────────────────────────────
[[redirects]]
  from   = "/api/contact"
  to     = "/.netlify/functions/contact"
  status = 200

[[redirects]]
  from   = "/api/order"
  to     = "/.netlify/functions/order"
  status = 200

[[redirects]]
  from   = "/api/onboarding"
  to     = "/.netlify/functions/onboarding"
  status = 200

[[redirects]]
  from   = "/api/link-operator-user"
  to     = "/.netlify/functions/link-operator-user"
  status = 200

[[redirects]]
  from   = "/api/abuse-monitor"
  to     = "/.netlify/functions/platform-abuse-monitor"
  status = 200

# ── Netlify function CORS headers ─────────────────────────────────────────────
[[headers]]
  for = "/.netlify/functions/*"
  [headers.values]
    Access-Control-Allow-Origin  = "*"
    Access-Control-Allow-Headers = "Content-Type, Authorization"
    Access-Control-Allow-Methods = "GET, POST, OPTIONS"

[[redirects]]
  from   = "/api/admin/set-tester-exempt"
  to     = "/.netlify/functions/admin-set-tester-exempt"
  status = 200

[[redirects]]
  from   = "/api/admin/delete-tenants"
  to     = "/.netlify/functions/admin-delete-tenants"
  status = 200

[[redirects]]
  from   = "/api/admin/delete-onboarding-requests"
  to     = "/.netlify/functions/admin-delete-onboarding-requests"
  status = 200

[[redirects]]
  from   = "/api/admin/send-password-reset"
  to     = "/.netlify/functions/admin-send-password-reset"
  status = 200

[[redirects]]
  from   = "/book"
  to     = "/book.html"
  status = 200

[[redirects]]
  from   = "/portal"
  to     = "/portal.html"
  status = 200

[[redirects]]
  from   = "/quote"
  to     = "/quote.html"
  status = 200

[[redirects]]
  from   = "/blog"
  to     = "/blog/index.html"
  status = 200

[[redirects]]
  from   = "/blog/"
  to     = "/blog/index.html"
  status = 200

[[redirects]]
  from   = "/api/blog-comment"
  to     = "/.netlify/functions/blog-comment"
  status = 200

[[redirects]]
  from   = "/api/blog-subscribe"
  to     = "/.netlify/functions/blog-subscribe"
  status = 200

# ── Scheduled functions ───────────────────────────────────────────────────────
[functions."platform-abuse-monitor"]
  schedule = "0 * * * *"   # every hour on the hour

[functions."process-recurring-orders"]
  schedule = "0 8 * * *"   # daily at 8 AM UTC

# ── app.prooflink.co → prooflink.co canonical redirect ────────────────────────
# If app.prooflink.co is added as a domain alias in Netlify, this redirects
# all traffic to the canonical root domain so there's no duplicate content.
[[redirects]]
  from   = "https://app.prooflink.co/*"
  to     = "https://prooflink.co/:splat"
  status = 301
  force  = true

# ── www.prooflink.co → canonical redirect ─────────────────────────────────────
[[redirects]]
  from   = "https://www.prooflink.co/*"
  to     = "https://prooflink.co/:splat"
  status = 301
  force  = true

# ── siteflows.netlify.app → canonical redirect ────────────────────────────────
[[redirects]]
  from   = "https://siteflows.netlify.app/*"
  to     = "https://prooflink.co/:splat"
  status = 301
  force  = true
