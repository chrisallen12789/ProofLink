<tr><td style="padding:28px;">
  <h1 style="margin:0 0 10px;font-size:22px;color:#2C1810;">Order request received</h1>
  <p style="margin:0 0 18px;font-size:14px;color:#444;line-height:1.6;">
    Hi {{name}}, we received your order request. We will confirm timing and details by email before baking.
  </p>

  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background:#FAF6F0;border-radius:6px;border:1px solid #E0D5C8;">
    <tr><td style="padding:14px 16px;">
      <p style="margin:0 0 6px;font-size:12px;color:#999;text-transform:uppercase;letter-spacing:0.6px;font-family:Calibri,Arial,sans-serif;">Cart Summary</p>
      <pre style="margin:0;white-space:pre-wrap;font-family:Consolas,monospace;font-size:12px;color:#333;line-height:1.5;">{{cartSummary}}</pre>
    </td></tr>
  </table>

  <p style="margin:18px 0 0;font-size:13px;color:#666;">
    If anything changes (pickup date, allergies, substitutions), reply to this email.
  </p>
</td></tr>
