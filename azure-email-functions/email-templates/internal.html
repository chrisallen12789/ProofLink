<tr><td style="padding:22px 28px;">
  <p style="margin:0 0 10px;font-size:14px;font-family:Calibri,Arial,sans-serif;color:#333;font-weight:bold;">
    New {{kind}} submission
  </p>
  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="border:1px solid #E0D5C8;border-radius:6px;">
    <tr><td style="padding:10px 12px;font-family:Calibri,Arial,sans-serif;font-size:13px;color:#333;">
      <div><b>Name:</b> {{name}}</div>
      <div><b>Email:</b> {{email}}</div>
      {{#if subject}}<div><b>Subject:</b> {{subject}}</div>{{/if}}
      {{#if message}}<div style="margin-top:8px;"><b>Message:</b><br/>{{message}}</div>{{/if}}
      {{#if cartSummary}}<div style="margin-top:8px;"><b>Cart:</b><br/><pre style="white-space:pre-wrap;margin:6px 0 0;">{{cartSummary}}</pre></div>{{/if}}
    </td></tr>
  </table>
</td></tr>
