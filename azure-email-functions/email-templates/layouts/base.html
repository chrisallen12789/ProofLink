<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>{{subject}}</title>
  <!--[if mso]><style>table{border-collapse:collapse;}</style><![endif]-->
</head>
<body style="margin:0;padding:0;background:#FAF6F0;font-family:Georgia,Times,serif;">
  <div style="display:none;max-height:0;overflow:hidden;">
    {{preheader}}&nbsp;&zwnj;&nbsp;&zwnj;&nbsp;&zwnj;
  </div>

  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background:#FAF6F0;">
    <tr><td align="center" style="padding:24px;">
      <table role="presentation" width="600" cellpadding="0" cellspacing="0" style="background:#FFFFFF;border-radius:8px;box-shadow:0 2px 8px rgba(0,0,0,0.06);">
        {{> header}}
        {{> body}}
        {{> signature}}
        {{> footer}}
      </table>
    </td></tr>
  </table>
</body>
</html>
