<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Honest To Crust | Temporarily Offline</title>

    <!-- favicon -->
  <link rel="icon" type="image/png" href="/assets/favicon.png">
  <link rel="shortcut icon" href="/favicon.ico">

  <meta name="robots" content="noindex,nofollow" />

  <style>
    :root {
      --bg: #0f0f0f;
      --card: #161616;
      --text: #f4f1ec;
      --muted: #b6b0a6;
      --accent: #c8a24d;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .wrap {
      max-width: 520px;
      padding: 2.5rem 2rem;
      background: var(--card);
      border-radius: 12px;
      text-align: center;
      box-shadow: 0 10px 30px rgba(0,0,0,0.6);
    }

    .logo {
      width: 140px;
      height: auto;
      margin-bottom: 1.5rem;
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 600;
      margin: 0 0 0.75rem;
      letter-spacing: 0.02em;
    }

    p {
      font-size: 0.95rem;
      line-height: 1.6;
      color: var(--muted);
      margin: 0.5rem 0;
    }

    .divider {
      width: 60px;
      height: 2px;
      background: var(--accent);
      margin: 1.5rem auto;
      opacity: 0.8;
    }

    .contact {
      margin-top: 1.25rem;
      font-size: 0.9rem;
    }

    .contact a {
      color: var(--accent);
      text-decoration: none;
    }

    .contact a:hover {
      text-decoration: underline;
    }

    footer {
      margin-top: 2rem;
      font-size: 0.75rem;
      color: #7d776d;
    }
  </style>
</head>

<body>
  <div id="site-nav"></div>
  <main class="wrap">
    <img src="assets/logo.png" alt="Honest To Crust logo" class="logo" />

    <h1>We’re stepping away from the oven for a moment</h1>

    <div class="divider"></div>

    <p>
      Honest To Crust is temporarily offline while we make a few careful updates behind the scenes.
    </p>

    <p>
      We don’t rush the process. The same goes for our website.
    </p>

    <p class="contact">
      If you need to reach us, email<br />
      <a href="mailto:info@honesttocrust.com">info@honesttocrust.com</a>
    </p>

    <footer>
      © <span id="year"></span> Honest To Crust
    </footer>
  </main>

  <script>
    document.getElementById("year").textContent = new Date().getFullYear();
  </script>
  <div id="site-footer"></div>
</body>
</html>
