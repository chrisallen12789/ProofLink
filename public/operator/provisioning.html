<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ProofLink — Provisioning</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --ink:    #0d0d0d;
      --bg:     #f0ede6;
      --card:   #ffffff;
      --cream:  #e8e4dc;
      --accent: #c84b2f;
      --gold:   #d4a843;
      --muted:  #6b6560;
      --border: #d9d4c9;
      --success-bg: rgba(46,125,50,0.06);
      --success-border: rgba(46,125,50,0.25);
      --success-text: #2e7d32;
      --error-bg: rgba(198,40,40,0.06);
      --error-border: rgba(198,40,40,0.25);
      --error-text: #c62828;
      --warn-bg: rgba(212,168,67,0.08);
      --warn-border: rgba(212,168,67,0.3);
      --warn-text: #8a6a00;
      --font-display: 'Syne', sans-serif;
      --font-body:    'DM Sans', sans-serif;
    }

    body {
      background: var(--bg);
      color: var(--ink);
      font-family: var(--font-body);
      font-size: 14px;
      line-height: 1.5;
    }

    /* ── OPERATOR SHELL ── */
    .op-layout {
      display: grid;
      grid-template-columns: 220px 1fr;
      min-height: 100vh;
    }

    /* Sidebar */
    .sidebar {
      background: var(--ink);
      padding: 1.5rem 0;
      position: sticky;
      top: 0;
      height: 100vh;
      overflow-y: auto;
    }

    .sidebar-logo {
      display: block;
      font-family: var(--font-display);
      font-weight: 800;
      font-size: 1.15rem;
      color: #f5f2eb;
      text-decoration: none;
      padding: 0 1.5rem 1.5rem;
      border-bottom: 1px solid rgba(255,255,255,0.07);
      margin-bottom: 1.5rem;
    }

    .sidebar-logo span { color: var(--accent); }

    .sidebar-nav {
      list-style: none;
      padding: 0 0.75rem;
    }

    .sidebar-nav li a {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      padding: 0.6rem 0.75rem;
      border-radius: 4px;
      color: rgba(245,242,235,0.5);
      text-decoration: none;
      font-size: 0.82rem;
      font-weight: 500;
      transition: background 0.15s, color 0.15s;
    }

    .sidebar-nav li a:hover,
    .sidebar-nav li a.active {
      background: rgba(255,255,255,0.07);
      color: #f5f2eb;
    }

    .sidebar-nav li a.active {
      color: #fff;
      background: rgba(200, 75, 47, 0.2);
    }

    .sidebar-section-label {
      font-size: 0.62rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: rgba(245,242,235,0.25);
      padding: 1.25rem 1.5rem 0.5rem;
    }

    /* Main content */
    .main-content {
      padding: 2rem 2.5rem;
      max-width: 1100px;
    }

    .page-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 2rem;
      padding-bottom: 1.5rem;
      border-bottom: 1px solid var(--border);
    }

    .page-title {
      font-family: var(--font-display);
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: var(--ink);
    }

    .page-subtitle {
      font-size: 0.82rem;
      color: var(--muted);
      margin-top: 0.25rem;
    }

    /* Status filter tabs */
    .filter-tabs {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1.5rem;
      flex-wrap: wrap;
    }

    .filter-tab {
      padding: 0.4rem 0.9rem;
      border: 1px solid var(--border);
      border-radius: 20px;
      font-size: 0.78rem;
      font-weight: 500;
      cursor: pointer;
      background: var(--card);
      color: var(--muted);
      transition: all 0.15s;
    }

    .filter-tab:hover { border-color: var(--ink); color: var(--ink); }
    .filter-tab.active { background: var(--ink); color: #fff; border-color: var(--ink); }

    .filter-tab .count {
      display: inline-block;
      background: rgba(255,255,255,0.2);
      border-radius: 10px;
      padding: 0 5px;
      font-size: 0.7rem;
      margin-left: 4px;
    }

    .filter-tab:not(.active) .count {
      background: var(--cream);
      color: var(--muted);
    }

    /* Table */
    .table-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 6px;
      overflow: hidden;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    thead th {
      padding: 0.75rem 1rem;
      text-align: left;
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      background: var(--cream);
      border-bottom: 1px solid var(--border);
    }

    tbody tr {
      border-bottom: 1px solid var(--border);
      transition: background 0.1s;
    }

    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: #fafaf8; }

    td {
      padding: 0.9rem 1rem;
      font-size: 0.82rem;
      color: var(--ink);
      vertical-align: middle;
    }

    .td-business { font-weight: 600; }
    .td-email { color: var(--muted); font-size: 0.78rem; }
    .td-type { color: var(--muted); }
    .td-date { color: var(--muted); font-family: monospace; font-size: 0.75rem; }

    /* Status badges */
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
      padding: 0.2rem 0.6rem;
      border-radius: 12px;
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.02em;
      text-transform: capitalize;
    }

    .badge-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
    }

    .badge.submitted   { background: rgba(107,101,96,0.1); color: var(--muted); }
    .badge.submitted .badge-dot { background: var(--muted); }

    .badge.approved    { background: var(--warn-bg); color: var(--warn-text); border: 1px solid var(--warn-border); }
    .badge.approved .badge-dot { background: var(--gold); }

    .badge.provisioning { background: rgba(25,118,210,0.08); color: #1565c0; border: 1px solid rgba(25,118,210,0.25); }
    .badge.provisioning .badge-dot { background: #1565c0; animation: pulse 1s ease-in-out infinite; }

    .badge.provisioned { background: var(--success-bg); color: var(--success-text); border: 1px solid var(--success-border); }
    .badge.provisioned .badge-dot { background: var(--success-text); }

    .badge.failed { background: var(--error-bg); color: var(--error-text); border: 1px solid var(--error-border); }
    .badge.failed .badge-dot { background: var(--error-text); }

    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }

    /* Action buttons */
    .btn-sm {
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
      padding: 0.35rem 0.8rem;
      border-radius: 3px;
      font-size: 0.75rem;
      font-weight: 600;
      cursor: pointer;
      border: 1px solid transparent;
      font-family: var(--font-body);
      transition: all 0.15s;
    }

    .btn-approve {
      background: var(--warn-bg);
      color: var(--warn-text);
      border-color: var(--warn-border);
    }
    .btn-approve:hover { background: rgba(212,168,67,0.15); }

    .btn-provision {
      background: rgba(200, 75, 47, 0.08);
      color: var(--accent);
      border-color: rgba(200, 75, 47, 0.25);
    }
    .btn-provision:hover { background: rgba(200, 75, 47, 0.14); }

    .btn-retry {
      background: var(--error-bg);
      color: var(--error-text);
      border-color: var(--error-border);
    }
    .btn-retry:hover { background: rgba(198,40,40,0.12); }

    .btn-sm:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    /* Error accordion */
    .error-row td {
      padding-top: 0;
      padding-bottom: 0.75rem;
    }

    .error-detail {
      background: var(--error-bg);
      border: 1px solid var(--error-border);
      border-radius: 4px;
      padding: 0.6rem 0.85rem;
      font-size: 0.75rem;
      color: var(--error-text);
      font-family: monospace;
      word-break: break-all;
    }

    /* Toast */
    #toast-container {
      position: fixed;
      bottom: 1.5rem;
      right: 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      z-index: 9999;
    }

    .toast {
      background: var(--ink);
      color: #f5f2eb;
      padding: 0.75rem 1.25rem;
      border-radius: 4px;
      font-size: 0.82rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      animation: toastIn 0.25s ease;
      box-shadow: 0 8px 30px rgba(0,0,0,0.2);
      max-width: 320px;
    }

    .toast.success { border-left: 3px solid #66bb6a; }
    .toast.error   { border-left: 3px solid #ef5350; }

    @keyframes toastIn {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Auth gate */
    #auth-gate {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: var(--bg);
    }

    .auth-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 2.5rem;
      width: 100%;
      max-width: 380px;
      text-align: center;
    }

    .auth-logo {
      font-family: var(--font-display);
      font-weight: 800;
      font-size: 1.5rem;
      color: var(--ink);
      margin-bottom: 0.5rem;
    }

    .auth-logo span { color: var(--accent); }

    .auth-title {
      font-size: 0.875rem;
      color: var(--muted);
      margin-bottom: 1.75rem;
    }

    .auth-input {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 0.7rem 0.9rem;
      font-size: 0.9rem;
      font-family: var(--font-body);
      color: var(--ink);
      margin-bottom: 0.75rem;
      outline: none;
      transition: border-color 0.2s;
    }

    .auth-input:focus { border-color: var(--accent); }

    .auth-btn {
      width: 100%;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 4px;
      padding: 0.75rem;
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 0.9rem;
      cursor: pointer;
      transition: background 0.2s;
    }

    .auth-btn:hover { background: #a83820; }
    .auth-error { color: var(--error-text); font-size: 0.8rem; margin-top: 0.5rem; }

    /* Empty state */
    .empty-state {
      text-align: center;
      padding: 4rem 2rem;
      color: var(--muted);
    }

    .empty-state .empty-icon { font-size: 2.5rem; margin-bottom: 0.75rem; }
    .empty-state .empty-title { font-family: var(--font-display); font-weight: 700; font-size: 1rem; color: var(--ink); margin-bottom: 0.4rem; }
    .empty-state p { font-size: 0.82rem; }

    /* Loading */
    .loading-row td {
      text-align: center;
      padding: 3rem;
      color: var(--muted);
    }

    .loader {
      width: 24px; height: 24px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: 0 auto 0.75rem;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* Responsive */
    @media (max-width: 768px) {
      .op-layout { grid-template-columns: 1fr; }
      .sidebar { position: static; height: auto; }
      .main-content { padding: 1.5rem 1rem; }
    }
  </style>
</head>
<body>

  <!-- AUTH GATE (shown until logged in) -->
  <div id="auth-gate">
    <div class="auth-card">
      <div class="auth-logo">Proof<span>Link</span></div>
      <div class="auth-title">Operator sign in</div>
      <input type="email" id="auth-email" class="auth-input" placeholder="operator@example.com" />
      <input type="password" id="auth-password" class="auth-input" placeholder="Password" />
      <button class="auth-btn" id="auth-btn">Sign In</button>
      <div class="auth-error" id="auth-error"></div>
    </div>
  </div>

  <!-- MAIN OPERATOR SHELL (hidden until logged in) -->
  <div class="op-layout" id="op-shell" style="display:none;">
    <aside class="sidebar">
      <a href="/operator/" class="sidebar-logo">Proof<span>Link</span></a>
      <div class="sidebar-section-label">Manage</div>
      <ul class="sidebar-nav">
        <li><a href="/operator/">📊 &nbsp;Dashboard</a></li>
        <li><a href="/operator/orders.html">📦 &nbsp;Orders</a></li>
        <li><a href="/operator/products.html">🛍️ &nbsp;Products</a></li>
        <li><a href="/operator/tenants.html">🏪 &nbsp;Tenants</a></li>
      </ul>
      <div class="sidebar-section-label">Platform</div>
      <ul class="sidebar-nav">
        <li><a href="/operator/provisioning.html" class="active">🔧 &nbsp;Provisioning</a></li>
        <li><a href="/operator/settings.html">⚙️ &nbsp;Settings</a></li>
      </ul>
      <div style="position:absolute;bottom:1.5rem;left:0;right:0;padding:0 1.5rem;">
        <button id="sign-out-btn" style="width:100%;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);color:rgba(245,242,235,0.5);padding:0.5rem;border-radius:4px;cursor:pointer;font-size:0.75rem;font-family:var(--font-body);">Sign out</button>
      </div>
    </aside>

    <main class="main-content">
      <div class="page-header">
        <div>
          <div class="page-title">Provisioning Queue</div>
          <div class="page-subtitle">Review and provision new business applications.</div>
        </div>
        <button class="btn-sm btn-provision" id="refresh-btn" style="padding:0.5rem 1rem;font-size:0.8rem;">
          ↻ Refresh
        </button>
      </div>

      <div class="filter-tabs">
        <button class="filter-tab active" data-status="">All <span class="count" id="count-all">–</span></button>
        <button class="filter-tab" data-status="submitted">Submitted <span class="count" id="count-submitted">–</span></button>
        <button class="filter-tab" data-status="approved">Approved <span class="count" id="count-approved">–</span></button>
        <button class="filter-tab" data-status="provisioning">Provisioning <span class="count" id="count-provisioning">–</span></button>
        <button class="filter-tab" data-status="provisioned">Provisioned <span class="count" id="count-provisioned">–</span></button>
        <button class="filter-tab" data-status="failed">Failed <span class="count" id="count-failed">–</span></button>
      </div>

      <div class="table-card">
        <table>
          <thead>
            <tr>
              <th>Business</th>
              <th>Type</th>
              <th>Location</th>
              <th>Submitted</th>
              <th>Status</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="requests-tbody">
            <tr class="loading-row">
              <td colspan="6">
                <div class="loader"></div>
                Loading requests…
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </main>
  </div>

  <div id="toast-container"></div>

  <script src="provisioning.js"></script>
</body>
</html>
