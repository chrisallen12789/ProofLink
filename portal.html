<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Your Account</title>
  <link rel="icon" href="/assets/favicon.png" />
  <link rel="manifest" href="/site.webmanifest" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0f1117;
      color: #e8e9eb;
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 40px 16px 60px;
    }
    .wrap { max-width: 600px; width: 100%; }
    .logo { font-size: 1.4rem; font-weight: 700; color: #c84b2f; margin-bottom: 4px; }
    .biz-name { font-size: 1.2rem; font-weight: 600; margin-bottom: 2px; }
    .sub { font-size: .875rem; color: rgba(255,255,255,.5); margin-bottom: 28px; }
    .card {
      background: #1a1d27;
      border: 1px solid rgba(255,255,255,.1);
      border-radius: 12px;
      padding: 24px;
      margin-bottom: 16px;
    }
    .card-hd { font-weight: 600; margin-bottom: 14px; font-size: .95rem; }
    label { display: block; font-size: .8rem; color: rgba(255,255,255,.6); margin-bottom: 4px; }
    input {
      width: 100%;
      background: #0f1117;
      border: 1px solid rgba(255,255,255,.15);
      border-radius: 6px;
      color: #e8e9eb;
      padding: 10px 12px;
      font-size: .9rem;
      margin-bottom: 14px;
      outline: none;
    }
    input:focus { border-color: #c84b2f; }
    .btn {
      background: #c84b2f;
      color: #fff;
      border: none;
      border-radius: 6px;
      padding: 10px 20px;
      font-size: .9rem;
      font-weight: 600;
      cursor: pointer;
      transition: background .2s;
    }
    .btn:hover { background: #a93e28; }
    .btn:disabled { opacity: .5; cursor: not-allowed; }
    .btn-ghost {
      background: rgba(255,255,255,.07);
      color: rgba(255,255,255,.8);
    }
    .btn-ghost:hover { background: rgba(255,255,255,.12); }
    .msg { margin-top: 12px; font-size: .875rem; padding: 10px 12px; border-radius: 6px; display: none; }
    .msg.error { background: rgba(239,68,68,.1); color: #f87171; border: 1px solid rgba(239,68,68,.2); display: block; }
    .hidden { display: none; }
    .section-title { font-size: .95rem; font-weight: 600; margin-bottom: 12px; }
    .order-row {
      padding: 12px 0;
      border-bottom: 1px solid rgba(255,255,255,.06);
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .order-row:last-child { border-bottom: none; }
    .order-title { font-weight: 500; font-size: .9rem; }
    .order-meta { font-size: .8rem; color: rgba(255,255,255,.5); margin-top: 2px; }
    .badge {
      font-size: .72rem;
      padding: 3px 8px;
      border-radius: 12px;
      background: rgba(255,255,255,.06);
      white-space: nowrap;
    }
    .badge.completed { color: #4ade80; }
    .badge.cancelled { color: #f87171; }
    .badge.new, .badge.pending { color: #93c5fd; }
    .badge.in_progress, .badge.active { color: #fbbf24; }
    .amount { font-size: .85rem; font-weight: 600; color: rgba(255,255,255,.8); margin-left: auto; white-space: nowrap; }
    .empty { font-size: .875rem; color: rgba(255,255,255,.35); padding: 8px 0; }
    .powered { text-align: center; font-size: .75rem; color: rgba(255,255,255,.3); margin-top: 24px; }
    .powered a { color: rgba(255,255,255,.4); text-decoration: none; }
    textarea {
      width: 100%;
      background: #0f1117;
      border: 1px solid rgba(255,255,255,.15);
      border-radius: 6px;
      color: #e8e9eb;
      padding: 10px 12px;
      font-size: .9rem;
      margin-bottom: 14px;
      outline: none;
      resize: vertical;
      min-height: 100px;
      font-family: inherit;
    }
    textarea:focus { border-color: #c84b2f; }
    .msg.success { background: rgba(34,197,94,.1); color: #4ade80; border: 1px solid rgba(34,197,94,.2); display: block; }
    .tabs { display: flex; gap: 4px; margin-bottom: 16px; border-bottom: 1px solid rgba(255,255,255,.08); }
    .tab-btn {
      background: none; border: none; color: rgba(255,255,255,.5); font-size: .875rem; padding: 8px 14px;
      cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -1px;
    }
    .tab-btn.active { color: #e8e9eb; border-bottom-color: #c84b2f; font-weight: 600; }
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }
    .book-link { display: inline-block; margin-top: 12px; color: #c84b2f; text-decoration: none; font-size: .875rem; }
    .book-link:hover { text-decoration: underline; }
    .search-row { display: flex; gap: 8px; margin-bottom: 12px; }
    .search-row input { margin-bottom: 0; flex: 1; }
    .btn-danger { background: rgba(239,68,68,.12); color: #f87171; border: 1px solid rgba(239,68,68,.2); }
    .btn-danger:hover { background: rgba(239,68,68,.22); }
    .cancel-booking-btn { font-size: .75rem; padding: 4px 10px; margin-left: auto; flex-shrink: 0; }
    .order-financials {
      display: flex; gap: 16px; flex-wrap: wrap; margin-top: 8px;
      padding-top: 8px; border-top: 1px solid rgba(255,255,255,.06);
    }
    .fin-item { display: flex; flex-direction: column; gap: 2px; }
    .fin-label { font-size: .72rem; color: rgba(255,255,255,.4); text-transform: uppercase; letter-spacing: .04em; }
    .fin-value { font-size: .88rem; font-weight: 600; color: rgba(255,255,255,.85); }
    .fin-value.due { color: #fbbf24; }
    .fin-value.paid { color: #4ade80; }
    .fin-value.overdue { color: #f87171; }
    .pay-btn {
      font-size: .78rem; padding: 5px 12px; margin-top: 2px;
      background: rgba(200,75,47,.15); color: #c84b2f;
      border: 1px solid rgba(200,75,47,.3); border-radius: 6px;
      cursor: pointer; font-weight: 600; transition: background .2s;
      text-decoration: none; display: inline-block;
    }
    .pay-btn:hover { background: rgba(200,75,47,.28); }
  </style>
</head>
<body>
<div class="wrap">
  <div class="logo">Your account</div>
  <div class="biz-name" id="bizName">Loadingâ€¦</div>
  <div class="sub" id="bizSub">View appointments, orders, estimates, and messages in one place.</div>

  <!-- Login form -->
  <div class="card" id="loginCard">
    <div class="card-hd">Enter the email you use with us</div>
    <label>Email address</label>
    <input type="email" id="portalEmail" placeholder="you@example.com" autocomplete="email" />
    <button class="btn" id="btnPortalLookup" type="button">Continue</button>
    <div class="msg" id="loginMsg"></div>
  </div>

  <!-- Portal content (shown after lookup) -->
  <div id="portalContent" class="hidden">
    <div class="tabs">
      <button class="tab-btn active" data-tab="orders" type="button">Orders</button>
      <button class="tab-btn" data-tab="bookings" type="button">Appointments</button>
      <button class="tab-btn" data-tab="quotes" type="button">Estimates</button>
      <button class="tab-btn" data-tab="contact" type="button">Contact</button>
    </div>

    <div class="tab-panel active" id="tab-orders">
      <div class="search-row"><input type="text" id="orderSearch" placeholder="Search orders…" /></div>
      <div id="ordersList"></div>
    </div>

    <div class="tab-panel" id="tab-bookings">
      <div class="search-row"><input type="text" id="bookingSearch" placeholder="Search appointments…" /></div>
      <div id="packageBalanceSection" style="display:none;margin-bottom:16px;">
        <div style="padding:14px 16px;background:rgba(200,75,47,.06);border:1px solid rgba(200,75,47,.2);border-radius:8px;">
          <div style="font-size:.75rem;font-weight:700;color:#c84b2f;text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px;">Active Package</div>
          <div id="packageBalanceName" style="font-weight:600;color:#e8e9eb;margin-bottom:4px;">—</div>
          <div id="packageBalanceDetail" style="font-size:.85rem;color:rgba(255,255,255,.6);">—</div>
          <div id="packageBalanceBar" style="margin-top:10px;height:6px;background:rgba(255,255,255,.1);border-radius:3px;">
            <div id="packageBalanceFill" style="height:100%;background:#c84b2f;border-radius:3px;width:0%;transition:width .4s;"></div>
          </div>
          <div id="packageBalanceExpiry" style="font-size:.75rem;color:rgba(255,255,255,.35);margin-top:6px;"></div>
        </div>
      </div>
      <div id="bookingsList"></div>
      <a class="book-link" id="newBookingLink" href="#" target="_blank">+ Schedule a new appointment →</a>
    </div>

    <div class="tab-panel" id="tab-quotes">
      <div id="quotesList"></div>
    </div>

    <div class="tab-panel" id="tab-contact">
      <div class="card">
        <div class="card-hd">Send a message</div>
        <label>Your name</label>
        <input type="text" id="contactName" placeholder="Your full name" autocomplete="name" />
        <label>Message</label>
        <textarea id="contactMessage" placeholder="How can we help you?"></textarea>
        <button class="btn" id="btnSendContact" type="button">Send message</button>
        <div class="msg" id="contactMsg"></div>
      </div>
    </div>

    <button class="btn btn-ghost" id="btnPortalBack" type="button" style="margin-top:12px;">← Use a different email</button>
  </div>

</div>

<script>
(function () {
  'use strict';

  function escHtml(s) {
    return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
  }

  const params   = new URLSearchParams(location.search);
  const tenantId = params.get('tenant');
  const prefill  = params.get('email');
  var portalEmail = '';
  var ALL_ORDERS   = [];
  var ALL_BOOKINGS = [];

  if (prefill) document.getElementById('portalEmail').value = prefill;
  document.getElementById('newBookingLink').textContent = '+ Schedule another appointment';
  document.getElementById('btnPortalBack').textContent = 'Use another email';

  // Tab switching
  document.querySelectorAll('.tab-btn').forEach(function (btn) {
    btn.addEventListener('click', function () {
      document.querySelectorAll('.tab-btn').forEach(function (b) { b.classList.remove('active'); });
      document.querySelectorAll('.tab-panel').forEach(function (p) { p.classList.remove('active'); });
      btn.classList.add('active');
      var panel = document.getElementById('tab-' + btn.dataset.tab);
      if (panel) panel.classList.add('active');
    });
  });

  // Load business name
  if (tenantId) {
    fetch('/.netlify/functions/get-public-tenant-info?tenant_id=' + encodeURIComponent(tenantId))
      .then(function (r) { return r.json(); })
      .then(function (d) {
        if (d && d.business_name) {
          document.getElementById('bizName').textContent = d.business_name;
          document.getElementById('bizSub').textContent = 'View appointments, orders, estimates, and messages with ' + d.business_name + '.';
          document.title = d.business_name + ' customer account';
        }
      })
      .catch(function () {});
  }

  function fmtDate(str) {
    if (!str) return '—';
    return new Date(str).toLocaleDateString(undefined, { month: 'short', day: 'numeric', year: 'numeric' });
  }
  function fmtMoney(amount) {
    if (!amount) return '';
    return '$' + Number(amount).toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ',');
  }
  function fmtCents(cents) {
    if (cents === null || cents === undefined || cents === '') return '';
    return '$' + (Number(cents) / 100).toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ',');
  }
  function statusBadge(s) {
    var key   = (s || 'new').replace(/[^a-z0-9_]/gi, '');
    var label = escHtml((s || 'new').replace(/_/g, ' '));
    return '<span class="badge ' + key + '">' + label + '</span>';
  }

  function renderPackageBalance(orders) {
    var section = document.getElementById('packageBalanceSection');
    if (!section) return;
    var pkg = (orders || []).find(function (o) {
      return o.order_type === 'package' && o.package_sessions_total > 0;
    });
    if (!pkg) { section.style.display = 'none'; return; }
    var total = pkg.package_sessions_total || 0;
    var used  = pkg.package_sessions_used  || 0;
    var remaining = Math.max(0, total - used);
    var pct = total > 0 ? Math.min(100, Math.round((used / total) * 100)) : 0;
    document.getElementById('packageBalanceName').textContent   = pkg.title || 'Package';
    document.getElementById('packageBalanceDetail').textContent = remaining + ' session' + (remaining !== 1 ? 's' : '') + ' remaining of ' + total;
    document.getElementById('packageBalanceFill').style.width   = pct + '%';
    if (pkg.package_valid_until) {
      var exp = new Date(pkg.package_valid_until);
      document.getElementById('packageBalanceExpiry').textContent =
        'Expires ' + (exp.getMonth() + 1) + '/' + exp.getDate() + '/' + exp.getFullYear();
    } else {
      document.getElementById('packageBalanceExpiry').textContent = '';
    }
    section.style.display = 'block';
  }

  function renderOrders(orders) {
    var el = document.getElementById('ordersList');
    if (!orders || !orders.length) {
      el.innerHTML = '<p class="empty">No orders yet. When the business sends one, it will appear here.</p>';
      return;
    }
    el.innerHTML = orders.map(function (o) {
      // Prefer cents-based fields; fall back to total_amount (legacy float field)
      var totalCents   = (o.total_cents != null)       ? Number(o.total_cents)       : null;
      var paidCents    = (o.amount_paid_cents != null)  ? Number(o.amount_paid_cents) : null;
      var dueCents     = (o.amount_due_cents != null)   ? Number(o.amount_due_cents)  : null;
      var legacyTotal  = o.total_amount ? fmtMoney(o.total_amount) : '';

      // Determine whether there are any financial figures worth showing
      var hasFinancials = (totalCents != null && totalCents > 0) ||
                          (paidCents  != null && paidCents  > 0) ||
                          (dueCents   != null);

      // Build the financial breakdown row
      var financialsHtml = '';
      if (hasFinancials) {
        var pState = o.payment_state || '';
        var dueClass = pState === 'overdue' ? 'overdue' : pState === 'paid' ? 'paid' : 'due';
        var items = [];

        if (totalCents != null && totalCents > 0) {
          items.push('<div class="fin-item"><span class="fin-label">Total</span><span class="fin-value">' + fmtCents(totalCents) + '</span></div>');
        }
        if (paidCents != null && paidCents > 0) {
          items.push('<div class="fin-item"><span class="fin-label">Paid</span><span class="fin-value paid">' + fmtCents(paidCents) + '</span></div>');
        }
        if (dueCents != null && dueCents > 0) {
          var dueLabel = pState === 'overdue' ? 'Overdue' : 'Balance Due';
          var dueDateNote = (o.payment_due_date && pState !== 'paid') ?
            ' <span style="font-size:.72rem;font-weight:400;color:rgba(255,255,255,.4);">by ' + fmtDate(o.payment_due_date) + '</span>' : '';
          items.push('<div class="fin-item"><span class="fin-label">' + dueLabel + '</span><span class="fin-value ' + dueClass + '">' + fmtCents(dueCents) + dueDateNote + '</span></div>');
        } else if (dueCents === 0 || pState === 'paid') {
          items.push('<div class="fin-item"><span class="fin-label">Balance Due</span><span class="fin-value paid">$0.00 — Paid in full</span></div>');
        }

        financialsHtml = '<div class="order-financials">' + items.join('') + '</div>';
      }

      // Show a "Pay Now" button only when there is an outstanding balance (and the order isn't void/cancelled)
      var payNowHtml = '';
      var canPay = dueCents > 0 && !['cancelled','void','completed'].includes(o.status);
      if (canPay) {
        payNowHtml = '<button class="pay-btn" onclick="handlePayNow(\'' + o.id + '\',' + dueCents + ')" style="cursor:pointer;">Pay Now</button>';
      }

      return '<div class="order-row" style="flex-direction:column;align-items:flex-start;gap:0;">' +
        '<div style="display:flex;align-items:center;gap:10px;width:100%;">' +
          '<div style="flex:1;min-width:0;">' +
            '<div class="order-title">' + escHtml(o.title || 'Order') + '</div>' +
            '<div class="order-meta">' + fmtDate(o.created_at) + '</div>' +
          '</div>' +
          statusBadge(o.status) +
          (!hasFinancials && legacyTotal ? '<div class="amount">' + legacyTotal + '</div>' : '') +
        '</div>' +
        financialsHtml +
        (payNowHtml ? '<div style="margin-top:8px;">' + payNowHtml + '</div>' : '') +
      '</div>';
    }).join('');
  }

  function renderBookings(bookings) {
    var el = document.getElementById('bookingsList');
    if (!bookings || !bookings.length) {
      el.innerHTML = '<p class="empty">No appointments yet. Confirmed appointments will appear here.</p>';
      return;
    }
    el.innerHTML = bookings.map(function (b) {
      var start = b.starts_at ? new Date(b.starts_at) : null;
      var timeStr = start ? start.toLocaleDateString(undefined, { weekday: 'short', month: 'short', day: 'numeric' }) + ' at ' +
        start.toLocaleTimeString(undefined, { hour: 'numeric', minute: '2-digit' }) : '—';
      var isFuture = start && start > new Date();
      var canCancel = isFuture && !['cancelled','completed','no_show'].includes(b.status);
      return '<div class="order-row" style="flex-wrap:wrap;align-items:flex-start;">' +
        '<div style="flex:1;min-width:0;">' +
          '<div class="order-title">' + escHtml(b.title || 'Appointment') + '</div>' +
          '<div class="order-meta">' + timeStr + '</div>' +
          (b.notes ? '<div style="font-size:.78rem;color:rgba(255,255,255,.4);margin-top:4px;">' + escHtml(b.notes) + '</div>' : '') +
        '</div>' +
        statusBadge(b.status) +
        (canCancel ? '<button class="btn btn-danger cancel-booking-btn" data-id="' + escHtml(b.id) + '" type="button">Cancel</button>' : '') +
      '</div>';
    }).join('');
    // Wire up cancel buttons
    el.querySelectorAll('.cancel-booking-btn').forEach(function (btn) {
      btn.addEventListener('click', function () {
        if (!confirm('Cancel this appointment?')) return;
        btn.disabled = true;
        btn.textContent = 'Cancelling…';
        fetch('/.netlify/functions/cancel-booking', {
          method : 'POST',
          headers: { 'Content-Type': 'application/json' },
          body   : JSON.stringify({ booking_id: btn.dataset.id, email: portalEmail }),
        })
          .then(function (r) { return r.json().then(function (d) { return { ok: r.ok, d: d }; }); })
          .then(function (res) {
            if (!res.ok) throw new Error(res.d.error || 'Failed to cancel');
            var idx = ALL_BOOKINGS.findIndex(function (bk) { return bk.id === btn.dataset.id; });
            if (idx >= 0) ALL_BOOKINGS[idx] = Object.assign({}, ALL_BOOKINGS[idx], { status: 'cancelled' });
            renderBookings(ALL_BOOKINGS);
          })
          .catch(function (err) {
            btn.disabled = false;
            btn.textContent = 'Cancel';
            alert(err.message || 'Failed to cancel appointment');
          });
      });
    });
  }

  function renderQuotes(quotes) {
    var el = document.getElementById('quotesList');
    if (!el) return;
    if (!quotes || !quotes.length) {
      el.innerHTML = '<p class="empty">No estimates yet. When the business sends one, it will appear here.</p>';
      return;
    }
    var fmt = function(cents) { return cents ? '$' + (cents / 100).toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ',') : ''; };
    el.innerHTML = quotes.map(function (q) {
      var isPending = q.status === 'pending';
      return '<div class="order-row" style="flex-direction:column;align-items:flex-start;gap:6px;">' +
        '<div style="display:flex;align-items:center;gap:10px;width:100%;">' +
          '<div style="flex:1;min-width:0;">' +
            '<div class="order-title">' + escHtml(q.title || 'Estimate') + '</div>' +
            '<div class="order-meta">' + fmtDate(q.created_at) + (q.valid_until ? ' · Valid until ' + fmtDate(q.valid_until) : '') + '</div>' +
          '</div>' +
          statusBadge(q.status) +
          (q.amount_cents ? '<div class="amount">' + fmt(q.amount_cents) + '</div>' : '') +
        '</div>' +
        (isPending ? '<a href="/quote.html?token=' + encodeURIComponent(q.id) + '" style="font-size:.82rem;color:#c84b2f;text-decoration:none;font-weight:600;">Review estimate</a>' : '') +
      '</div>';
    }).join('');
  }

  document.getElementById('portalEmail').addEventListener('keydown', function (e) {
    if (e.key === 'Enter') document.getElementById('btnPortalLookup').click();
  });

  document.getElementById('btnPortalLookup').addEventListener('click', function () {
    var btn   = document.getElementById('btnPortalLookup');
    var msg   = document.getElementById('loginMsg');
    var email = document.getElementById('portalEmail').value.trim();
    msg.className = 'msg';
    msg.style.display = 'none';

    if (!email) {
      msg.textContent = 'Please enter your email address.';
      msg.className = 'msg error';
      return;
    }
    if (!tenantId) {
      msg.textContent = 'This customer page is missing business information. Please ask for a fresh link.';
      msg.className = 'msg error';
      return;
    }

    btn.disabled = true;
    btn.textContent = 'Loading...';

    fetch('/.netlify/functions/get-customer-portal', {
      method : 'POST',
      headers: { 'Content-Type': 'application/json' },
      body   : JSON.stringify({ email: email, tenant_id: tenantId }),
    })
      .then(function (r) { return r.json().then(function (d) { return { ok: r.ok, d: d }; }); })
      .then(function (res) {
        btn.disabled = false;
        btn.textContent = 'Continue';
        if (!res.ok) throw new Error(res.d.error || 'Not found');
        var d = res.d;
        if (d.business_name) {
          document.getElementById('bizName').textContent = d.business_name;
          document.getElementById('bizSub').textContent = 'Welcome back. Here is everything with ' + d.business_name + '.';
          document.title = d.business_name + ' customer account';
        }
        ALL_ORDERS   = d.orders   || [];
        ALL_BOOKINGS = d.bookings || [];
        portalEmail  = email;
        window._portalEmail = email;
        renderOrders(ALL_ORDERS);
        renderBookings(ALL_BOOKINGS);
        renderPackageBalance(ALL_ORDERS);
        renderQuotes(d.quotes || []);
        // Pre-fill contact form name from first known record
        var knownName = (d.orders && d.orders[0] && d.orders[0].customer_name) ||
                        (d.bookings && d.bookings[0] && d.bookings[0].customer_name) || '';
        if (knownName) document.getElementById('contactName').value = knownName;
        var bookLink = document.getElementById('newBookingLink');
        if (bookLink) bookLink.href = '/book.html?tenant=' + encodeURIComponent(tenantId) + '&email=' + encodeURIComponent(email);
        document.getElementById('loginCard').classList.add('hidden');
        document.getElementById('portalContent').classList.remove('hidden');
      })
      .catch(function (err) {
        btn.disabled = false;
        btn.textContent = 'Continue';
        msg.textContent = (err.message === 'Not found')
          ? 'We could not find anything for that email yet. Try the email you use with the business.'
          : (err.message || 'Something went wrong. Please try again.');
        msg.className = 'msg error';
      });
  });

  document.getElementById('orderSearch').addEventListener('input', function () {
    var q = this.value.toLowerCase();
    var filtered = q ? ALL_ORDERS.filter(function (o) {
      return (o.title || '').toLowerCase().includes(q) || (o.status || '').toLowerCase().includes(q);
    }) : ALL_ORDERS;
    renderOrders(filtered);
  });

  document.getElementById('bookingSearch').addEventListener('input', function () {
    var q = this.value.toLowerCase();
    var filtered = q ? ALL_BOOKINGS.filter(function (b) {
      return (b.title || '').toLowerCase().includes(q) || (b.status || '').toLowerCase().includes(q) ||
             (b.notes || '').toLowerCase().includes(q);
    }) : ALL_BOOKINGS;
    renderBookings(filtered);
  });

  document.getElementById('btnPortalBack').addEventListener('click', function () {
    document.getElementById('portalContent').classList.add('hidden');
    document.getElementById('loginCard').classList.remove('hidden');
  });

  document.getElementById('btnSendContact').addEventListener('click', function () {
    var btn     = document.getElementById('btnSendContact');
    var msgEl   = document.getElementById('contactMsg');
    var name    = document.getElementById('contactName').value.trim();
    var message = document.getElementById('contactMessage').value.trim();
    var email   = document.getElementById('portalEmail').value.trim();
    msgEl.className = 'msg';
    msgEl.style.display = 'none';

    if (!name) {
      msgEl.textContent = 'Please enter your name.';
      msgEl.className = 'msg error';
      return;
    }
    if (!message) {
      msgEl.textContent = 'Please enter a message.';
      msgEl.className = 'msg error';
      return;
    }
    if (message.length > 2000) {
      msgEl.textContent = 'Message is too long (max 2000 characters).';
      msgEl.className = 'msg error';
      return;
    }

    btn.disabled = true;
    btn.textContent = 'Sending\u2026';

    fetch('/.netlify/functions/portal-message', {
      method : 'POST',
      headers: { 'Content-Type': 'application/json' },
      body   : JSON.stringify({ tenant_id: tenantId, email: email, name: name, message: message }),
    })
      .then(function (r) { return r.json().then(function (d) { return { ok: r.ok, d: d }; }); })
      .then(function (res) {
        btn.disabled = false;
        btn.textContent = 'Send message';
        if (!res.ok) throw new Error(res.d.error || 'Failed to send message');
        msgEl.textContent = 'Your message has been sent. We\u2019ll be in touch shortly.';
        msgEl.className = 'msg success';
        document.getElementById('contactMessage').value = '';
      })
      .catch(function (err) {
        btn.disabled = false;
        btn.textContent = 'Send message';
        msgEl.textContent = err.message || 'Something went wrong. Please try again.';
        msgEl.className = 'msg error';
      });
  });
})();

async function handlePayNow(orderId, balanceCents) {
  const btn = event.currentTarget;
  btn.disabled = true;
  btn.textContent = 'Loading\u2026';
  try {
    // Get the customer email from the portal session
    const email = window._portalEmail || '';
    const url = '/.netlify/functions/portal-checkout?order_id=' + encodeURIComponent(orderId) + '&email=' + encodeURIComponent(email);
    const res = await fetch(url);
    const data = await res.json();
    if (!res.ok) {
      if (data.contact_needed) {
        alert('Online payment is not set up for this business. Please contact your provider directly to arrange payment.');
      } else {
        alert(data.error || 'Payment error. Please contact your provider.');
      }
      btn.disabled = false;
      btn.textContent = 'Pay Now';
      return;
    }
    // Redirect to Stripe Checkout
    window.location.href = data.checkout_url;
  } catch (err) {
    alert('Could not connect to payment service. Please try again or contact your provider.');
    btn.disabled = false;
    btn.textContent = 'Pay Now';
  }
}
</script>
