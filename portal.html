<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Customer Portal</title>
  <link rel="icon" href="/assets/favicon.png" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0f1117;
      color: #e8e9eb;
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 40px 16px 60px;
    }
    .wrap { max-width: 600px; width: 100%; }
    .logo { font-size: 1.4rem; font-weight: 700; color: #c84b2f; margin-bottom: 4px; }
    .biz-name { font-size: 1.2rem; font-weight: 600; margin-bottom: 2px; }
    .sub { font-size: .875rem; color: rgba(255,255,255,.5); margin-bottom: 28px; }
    .card {
      background: #1a1d27;
      border: 1px solid rgba(255,255,255,.1);
      border-radius: 12px;
      padding: 24px;
      margin-bottom: 16px;
    }
    .card-hd { font-weight: 600; margin-bottom: 14px; font-size: .95rem; }
    label { display: block; font-size: .8rem; color: rgba(255,255,255,.6); margin-bottom: 4px; }
    input {
      width: 100%;
      background: #0f1117;
      border: 1px solid rgba(255,255,255,.15);
      border-radius: 6px;
      color: #e8e9eb;
      padding: 10px 12px;
      font-size: .9rem;
      margin-bottom: 14px;
      outline: none;
    }
    input:focus { border-color: #c84b2f; }
    .btn {
      background: #c84b2f;
      color: #fff;
      border: none;
      border-radius: 6px;
      padding: 10px 20px;
      font-size: .9rem;
      font-weight: 600;
      cursor: pointer;
      transition: background .2s;
    }
    .btn:hover { background: #a93e28; }
    .btn:disabled { opacity: .5; cursor: not-allowed; }
    .btn-ghost {
      background: rgba(255,255,255,.07);
      color: rgba(255,255,255,.8);
    }
    .btn-ghost:hover { background: rgba(255,255,255,.12); }
    .msg { margin-top: 12px; font-size: .875rem; padding: 10px 12px; border-radius: 6px; display: none; }
    .msg.error { background: rgba(239,68,68,.1); color: #f87171; border: 1px solid rgba(239,68,68,.2); display: block; }
    .hidden { display: none; }
    .section-title { font-size: .95rem; font-weight: 600; margin-bottom: 12px; }
    .order-row {
      padding: 12px 0;
      border-bottom: 1px solid rgba(255,255,255,.06);
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .order-row:last-child { border-bottom: none; }
    .order-title { font-weight: 500; font-size: .9rem; }
    .order-meta { font-size: .8rem; color: rgba(255,255,255,.5); margin-top: 2px; }
    .badge {
      font-size: .72rem;
      padding: 3px 8px;
      border-radius: 12px;
      background: rgba(255,255,255,.06);
      white-space: nowrap;
    }
    .badge.completed { color: #4ade80; }
    .badge.cancelled { color: #f87171; }
    .badge.new, .badge.pending { color: #93c5fd; }
    .badge.in_progress, .badge.active { color: #fbbf24; }
    .amount { font-size: .85rem; font-weight: 600; color: rgba(255,255,255,.8); margin-left: auto; white-space: nowrap; }
    .empty { font-size: .875rem; color: rgba(255,255,255,.35); padding: 8px 0; }
    .powered { text-align: center; font-size: .75rem; color: rgba(255,255,255,.3); margin-top: 24px; }
    .powered a { color: rgba(255,255,255,.4); text-decoration: none; }
    textarea {
      width: 100%;
      background: #0f1117;
      border: 1px solid rgba(255,255,255,.15);
      border-radius: 6px;
      color: #e8e9eb;
      padding: 10px 12px;
      font-size: .9rem;
      margin-bottom: 14px;
      outline: none;
      resize: vertical;
      min-height: 100px;
      font-family: inherit;
    }
    textarea:focus { border-color: #c84b2f; }
    .msg.success { background: rgba(34,197,94,.1); color: #4ade80; border: 1px solid rgba(34,197,94,.2); display: block; }
    .tabs { display: flex; gap: 4px; margin-bottom: 16px; border-bottom: 1px solid rgba(255,255,255,.08); }
    .tab-btn {
      background: none; border: none; color: rgba(255,255,255,.5); font-size: .875rem; padding: 8px 14px;
      cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -1px;
    }
    .tab-btn.active { color: #e8e9eb; border-bottom-color: #c84b2f; font-weight: 600; }
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }
    .book-link { display: inline-block; margin-top: 12px; color: #c84b2f; text-decoration: none; font-size: .875rem; }
    .book-link:hover { text-decoration: underline; }
  </style>
</head>
<body>
<div class="wrap">
  <div class="logo">ProofLink</div>
  <div class="biz-name" id="bizName">Customer Portal</div>
  <div class="sub" id="bizSub">View your order history and upcoming appointments.</div>

  <!-- Login form -->
  <div class="card" id="loginCard">
    <div class="card-hd">Enter your email to continue</div>
    <label>Email address</label>
    <input type="email" id="portalEmail" placeholder="you@example.com" autocomplete="email" />
    <button class="btn" id="btnPortalLookup" type="button">View my history</button>
    <div class="msg" id="loginMsg"></div>
  </div>

  <!-- Portal content (shown after lookup) -->
  <div id="portalContent" class="hidden">
    <div class="tabs">
      <button class="tab-btn active" data-tab="orders" type="button">Orders</button>
      <button class="tab-btn" data-tab="bookings" type="button">Appointments</button>
      <button class="tab-btn" data-tab="quotes" type="button">Quotes</button>
      <button class="tab-btn" data-tab="contact" type="button">Contact</button>
    </div>

    <div class="tab-panel active" id="tab-orders">
      <div id="ordersList"></div>
    </div>

    <div class="tab-panel" id="tab-bookings">
      <div id="bookingsList"></div>
      <a class="book-link" id="newBookingLink" href="#" target="_blank">+ Schedule a new appointment →</a>
    </div>

    <div class="tab-panel" id="tab-quotes">
      <div id="quotesList"></div>
    </div>

    <div class="tab-panel" id="tab-contact">
      <div class="card">
        <div class="card-hd">Send a message</div>
        <label>Your name</label>
        <input type="text" id="contactName" placeholder="Your full name" autocomplete="name" />
        <label>Message</label>
        <textarea id="contactMessage" placeholder="How can we help you?"></textarea>
        <button class="btn" id="btnSendContact" type="button">Send Message</button>
        <div class="msg" id="contactMsg"></div>
      </div>
    </div>

    <button class="btn btn-ghost" id="btnPortalBack" type="button" style="margin-top:12px;">← Use a different email</button>
  </div>

  <div class="powered">Powered by <a href="https://prooflink.co" target="_blank">ProofLink</a></div>
</div>

<script>
(function () {
  'use strict';

  function escHtml(s) {
    return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
  }

  const params   = new URLSearchParams(location.search);
  const tenantId = params.get('tenant');
  const prefill  = params.get('email');

  if (prefill) document.getElementById('portalEmail').value = prefill;

  // Tab switching
  document.querySelectorAll('.tab-btn').forEach(function (btn) {
    btn.addEventListener('click', function () {
      document.querySelectorAll('.tab-btn').forEach(function (b) { b.classList.remove('active'); });
      document.querySelectorAll('.tab-panel').forEach(function (p) { p.classList.remove('active'); });
      btn.classList.add('active');
      var panel = document.getElementById('tab-' + btn.dataset.tab);
      if (panel) panel.classList.add('active');
    });
  });

  // Load business name
  if (tenantId) {
    fetch('/.netlify/functions/get-public-tenant-info?tenant_id=' + encodeURIComponent(tenantId))
      .then(function (r) { return r.json(); })
      .then(function (d) {
        if (d && d.business_name) {
          document.getElementById('bizName').textContent = d.business_name;
          document.getElementById('bizSub').textContent = 'View your order history with ' + d.business_name + '.';
        }
      })
      .catch(function () {});
  }

  function fmtDate(str) {
    if (!str) return '—';
    return new Date(str).toLocaleDateString(undefined, { month: 'short', day: 'numeric', year: 'numeric' });
  }
  function fmtMoney(amount) {
    if (!amount) return '';
    return '$' + Number(amount).toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ',');
  }
  function statusBadge(s) {
    var key   = (s || 'new').replace(/[^a-z0-9_]/gi, '');
    var label = escHtml((s || 'new').replace(/_/g, ' '));
    return '<span class="badge ' + key + '">' + label + '</span>';
  }

  function renderOrders(orders) {
    var el = document.getElementById('ordersList');
    if (!orders || !orders.length) {
      el.innerHTML = '<p class="empty">No orders found for this email.</p>';
      return;
    }
    el.innerHTML = orders.map(function (o) {
      return '<div class="order-row">' +
        '<div style="flex:1;min-width:0;">' +
          '<div class="order-title">' + escHtml(o.title || 'Order') + '</div>' +
          '<div class="order-meta">' + fmtDate(o.created_at) + '</div>' +
        '</div>' +
        statusBadge(o.status) +
        (o.total_amount ? '<div class="amount">' + fmtMoney(o.total_amount) + '</div>' : '') +
      '</div>';
    }).join('');
  }

  function renderBookings(bookings) {
    var el = document.getElementById('bookingsList');
    if (!bookings || !bookings.length) {
      el.innerHTML = '<p class="empty">No appointments on record for this email.</p>';
      return;
    }
    el.innerHTML = bookings.map(function (b) {
      var start = b.starts_at ? new Date(b.starts_at) : null;
      var timeStr = start ? start.toLocaleDateString(undefined, { weekday: 'short', month: 'short', day: 'numeric' }) + ' at ' +
        start.toLocaleTimeString(undefined, { hour: 'numeric', minute: '2-digit' }) : '—';
      return '<div class="order-row">' +
        '<div style="flex:1;min-width:0;">' +
          '<div class="order-title">' + escHtml(b.title || 'Appointment') + '</div>' +
          '<div class="order-meta">' + timeStr + '</div>' +
        '</div>' +
        statusBadge(b.status) +
      '</div>';
    }).join('');
  }

  function renderQuotes(quotes) {
    var el = document.getElementById('quotesList');
    if (!el) return;
    if (!quotes || !quotes.length) {
      el.innerHTML = '<p class="empty">No quotes on record for this email.</p>';
      return;
    }
    var fmt = function(cents) { return cents ? '$' + (cents / 100).toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ',') : ''; };
    el.innerHTML = quotes.map(function (q) {
      var isPending = q.status === 'pending';
      return '<div class="order-row" style="flex-direction:column;align-items:flex-start;gap:6px;">' +
        '<div style="display:flex;align-items:center;gap:10px;width:100%;">' +
          '<div style="flex:1;min-width:0;">' +
            '<div class="order-title">' + escHtml(q.title || 'Quote') + '</div>' +
            '<div class="order-meta">' + fmtDate(q.created_at) + (q.valid_until ? ' · Valid until ' + fmtDate(q.valid_until) : '') + '</div>' +
          '</div>' +
          statusBadge(q.status) +
          (q.amount_cents ? '<div class="amount">' + fmt(q.amount_cents) + '</div>' : '') +
        '</div>' +
        (isPending ? '<a href="/quote.html?id=' + encodeURIComponent(q.id) + '" style="font-size:.82rem;color:#c84b2f;text-decoration:none;font-weight:600;">Review &amp; accept quote →</a>' : '') +
      '</div>';
    }).join('');
  }

  document.getElementById('portalEmail').addEventListener('keydown', function (e) {
    if (e.key === 'Enter') document.getElementById('btnPortalLookup').click();
  });

  document.getElementById('btnPortalLookup').addEventListener('click', function () {
    var btn   = document.getElementById('btnPortalLookup');
    var msg   = document.getElementById('loginMsg');
    var email = document.getElementById('portalEmail').value.trim();
    msg.className = 'msg';
    msg.style.display = 'none';

    if (!email) {
      msg.textContent = 'Please enter your email address.';
      msg.className = 'msg error';
      return;
    }
    if (!tenantId) {
      msg.textContent = 'Invalid portal link — missing business ID.';
      msg.className = 'msg error';
      return;
    }

    btn.disabled = true;
    btn.textContent = 'Looking up…';

    fetch('/.netlify/functions/get-customer-portal', {
      method : 'POST',
      headers: { 'Content-Type': 'application/json' },
      body   : JSON.stringify({ email: email, tenant_id: tenantId }),
    })
      .then(function (r) { return r.json().then(function (d) { return { ok: r.ok, d: d }; }); })
      .then(function (res) {
        btn.disabled = false;
        btn.textContent = 'View my history';
        if (!res.ok) throw new Error(res.d.error || 'Not found');
        var d = res.d;
        if (d.business_name) {
          document.getElementById('bizName').textContent = d.business_name;
          document.getElementById('bizSub').textContent = 'Welcome back! Here\'s your history with ' + d.business_name + '.';
        }
        renderOrders(d.orders);
        renderBookings(d.bookings);
        renderQuotes(d.quotes || []);
        // Pre-fill contact form name from first known record
        var knownName = (d.orders && d.orders[0] && d.orders[0].customer_name) ||
                        (d.bookings && d.bookings[0] && d.bookings[0].customer_name) || '';
        if (knownName) document.getElementById('contactName').value = knownName;
        var bookLink = document.getElementById('newBookingLink');
        if (bookLink) bookLink.href = '/book.html?tenant=' + encodeURIComponent(tenantId) + '&email=' + encodeURIComponent(email);
        document.getElementById('loginCard').classList.add('hidden');
        document.getElementById('portalContent').classList.remove('hidden');
      })
      .catch(function (err) {
        btn.disabled = false;
        btn.textContent = 'View my history';
        msg.textContent = err.message || 'Something went wrong. Please try again.';
        msg.className = 'msg error';
      });
  });

  document.getElementById('btnPortalBack').addEventListener('click', function () {
    document.getElementById('portalContent').classList.add('hidden');
    document.getElementById('loginCard').classList.remove('hidden');
  });

  document.getElementById('btnSendContact').addEventListener('click', function () {
    var btn     = document.getElementById('btnSendContact');
    var msgEl   = document.getElementById('contactMsg');
    var name    = document.getElementById('contactName').value.trim();
    var message = document.getElementById('contactMessage').value.trim();
    var email   = document.getElementById('portalEmail').value.trim();
    msgEl.className = 'msg';
    msgEl.style.display = 'none';

    if (!name) {
      msgEl.textContent = 'Please enter your name.';
      msgEl.className = 'msg error';
      return;
    }
    if (!message) {
      msgEl.textContent = 'Please enter a message.';
      msgEl.className = 'msg error';
      return;
    }
    if (message.length > 2000) {
      msgEl.textContent = 'Message is too long (max 2000 characters).';
      msgEl.className = 'msg error';
      return;
    }

    btn.disabled = true;
    btn.textContent = 'Sending\u2026';

    fetch('/.netlify/functions/portal-message', {
      method : 'POST',
      headers: { 'Content-Type': 'application/json' },
      body   : JSON.stringify({ tenant_id: tenantId, email: email, name: name, message: message }),
    })
      .then(function (r) { return r.json().then(function (d) { return { ok: r.ok, d: d }; }); })
      .then(function (res) {
        btn.disabled = false;
        btn.textContent = 'Send Message';
        if (!res.ok) throw new Error(res.d.error || 'Failed to send message');
        msgEl.textContent = 'Your message has been sent. We\u2019ll be in touch shortly.';
        msgEl.className = 'msg success';
        document.getElementById('contactMessage').value = '';
      })
      .catch(function (err) {
        btn.disabled = false;
        btn.textContent = 'Send Message';
        msgEl.textContent = err.message || 'Something went wrong. Please try again.';
        msgEl.className = 'msg error';
      });
  });
})();
</script>
</body>
</html>
