name: Security Scan

on:
  push:
    branches:
      - main
      - master
      - "codex/**"
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: "0 8 * * 1"

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  codeql:
    name: CodeQL
    if: ${{ vars.ENABLE_CODEQL == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v3

  codeql-skipped:
    name: CodeQL Skipped
    if: ${{ vars.ENABLE_CODEQL != 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Explain why CodeQL is skipped
        run: |
          echo "Skipping CodeQL because ENABLE_CODEQL is not set to true for this repository."
          echo "If you enable GitHub code scanning / Advanced Security later, set the repository variable ENABLE_CODEQL=true to turn this workflow back on."
