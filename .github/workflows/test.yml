name: Test

on:
  push:
    branches:
      - main
      - master
      - "codex/**"
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: test-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit:
    name: Unit
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Audit dependencies for high severity vulnerabilities
        run: npm audit --audit-level=high

      - name: Run unit tests
        run: npm run test:unit

  hosted-integration:
    name: Hosted Integration
    needs: unit
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      TEST_SUPABASE_URL: ${{ secrets.TEST_SUPABASE_URL }}
      TEST_SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.TEST_SUPABASE_SERVICE_ROLE_KEY }}
      TEST_SUPABASE_ANON_KEY: ${{ secrets.TEST_SUPABASE_ANON_KEY }}
      TEST_SITE_URL: ${{ secrets.TEST_SITE_URL }}
      TEST_PLATFORM_ADMIN_EMAIL: ${{ secrets.TEST_PLATFORM_ADMIN_EMAIL }}
      TEST_PLATFORM_ADMIN_PASSWORD: ${{ secrets.TEST_PLATFORM_ADMIN_PASSWORD }}
      TEST_TENANT_A_ADMIN_EMAIL: ${{ secrets.TEST_TENANT_A_ADMIN_EMAIL }}
      TEST_TENANT_A_ADMIN_PASSWORD: ${{ secrets.TEST_TENANT_A_ADMIN_PASSWORD }}
      TEST_TENANT_B_ADMIN_EMAIL: ${{ secrets.TEST_TENANT_B_ADMIN_EMAIL }}
      TEST_TENANT_B_ADMIN_PASSWORD: ${{ secrets.TEST_TENANT_B_ADMIN_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check hosted test secrets
        id: hosted_secrets
        shell: bash
        run: |
          missing=()
          for key in \
            TEST_SUPABASE_URL \
            TEST_SUPABASE_SERVICE_ROLE_KEY \
            TEST_SUPABASE_ANON_KEY \
            TEST_SITE_URL \
            TEST_PLATFORM_ADMIN_EMAIL \
            TEST_PLATFORM_ADMIN_PASSWORD \
            TEST_TENANT_A_ADMIN_EMAIL \
            TEST_TENANT_A_ADMIN_PASSWORD \
            TEST_TENANT_B_ADMIN_EMAIL \
            TEST_TENANT_B_ADMIN_PASSWORD; do
            if [ -z "${!key}" ]; then
              missing+=("$key")
            fi
          done

          if [ "${#missing[@]}" -gt 0 ]; then
            echo "ready=false" >> "$GITHUB_OUTPUT"
            printf 'missing=%s\n' "$(IFS=,; echo "${missing[*]}")" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "ready=true" >> "$GITHUB_OUTPUT"

      - name: Fail when hosted test secrets are missing on trusted runs
        if: ${{ steps.hosted_secrets.outputs.ready != 'true' && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository) }}
        run: |
          echo "Hosted integration secrets are missing: ${{ steps.hosted_secrets.outputs.missing }}"
          exit 1

      - name: Skip hosted suite on external pull requests without secrets
        if: ${{ steps.hosted_secrets.outputs.ready != 'true' && github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name != github.repository }}
        run: echo "Skipping hosted integration suite for external pull requests; missing secrets: ${{ steps.hosted_secrets.outputs.missing }}"

      - name: Setup Node
        if: ${{ steps.hosted_secrets.outputs.ready == 'true' }}
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        if: ${{ steps.hosted_secrets.outputs.ready == 'true' }}
        run: npm ci

      - name: Cleanup hosted test data
        if: ${{ steps.hosted_secrets.outputs.ready == 'true' }}
        run: npm run test:cleanup

      - name: Seed hosted test data
        if: ${{ steps.hosted_secrets.outputs.ready == 'true' }}
        run: npm run test:seed

      - name: Run integration tests
        if: ${{ steps.hosted_secrets.outputs.ready == 'true' }}
        run: npm run test:integration
